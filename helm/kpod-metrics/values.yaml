image:
  repository: internal-registry/kpod-metrics
  tag: "1.9.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
# - name: my-registry-secret

priorityClassName: ""
# system-node-critical — recommended for production to guarantee scheduling

resources:
  requests:
    cpu: 150m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

updateStrategy:
  maxUnavailable: 1

extraEnv: []
# - name: JAVA_OPTS
#   value: "-Xmx384m"

probes:
  startup:
    periodSeconds: 5
    failureThreshold: 30
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    initialDelaySeconds: 15
    periodSeconds: 5

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/actuator/prometheus"

nodeSelector:
  kubernetes.io/os: linux

tolerations:
  - operator: Exists

affinity: {}

topologySpreadConstraints: []

# Root is required: eBPF program loading and reading /sys/fs/cgroup + /proc
# host paths require uid 0 even with capabilities granted.
podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0

securityContext:
  # Set to true for kind/minikube or environments without proper seccomp profiles.
  # In production, false + BPF/PERFMON capabilities is preferred.
  privileged: false
  allowPrivilegeEscalation: false
  # seccompProfile:
  #   type: RuntimeDefault

pdb:
  enabled: true
  maxUnavailable: 1

networkPolicy:
  enabled: false

grafana:
  dashboard:
    enabled: true
    label: "1"
    annotations: {}

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  annotations: {}

prometheusRule:
  enabled: false
  labels: {}
  annotations: {}

otlp:
  enabled: false
  endpoint: "http://localhost:4318/v1/metrics"
  headers: {}
  # api-key: "my-api-key"
  step: 60000
  # Reference an existing Secret for OTLP headers (recommended over plaintext headers)
  # The Secret should contain keys matching header names (e.g., api-key: <base64-encoded-value>)
  existingSecret: ""

config:
  profile: standard
  pollInterval: 30000
  startupJitter: 5000
  collectionTimeout: 20000
  clusterName: ""
  discovery:
    mode: informer
    kubeletPollInterval: 30
  cgroup:
    root: /sys/fs/cgroup
    procRoot: /host/proc
  filter:
    namespaces: []
    excludeNamespaces:
      - kube-system
      - kube-public
    labelSelector: ""
    includeLabels:
      - app
      - app.kubernetes.io/name
      - app.kubernetes.io/component
  # Per-collector intervals in ms (null = same as pollInterval)
  # Heavy collectors can run less often to reduce kernel overhead
  # collector-intervals:
  #   syscall: 60000
  #   biolatency: 60000
  #   hardirqs: 60000
  #   softirqs: 60000
  # Per-collector overrides (null = use profile default, true/false = force)
  # collectors:
  #   cpu: true
  #   network: true
  #   syscall: false
  #   biolatency: false
  #   cachestat: false
  #   tcpdrop: true
  #   hardirqs: false
  #   softirqs: false
  #   execsnoop: true
  #   diskIO: true
  #   ifaceNet: true
  #   filesystem: true

profiling:
  enabled: false
  cpu:
    enabled: true
    frequency: 99
    stackDepth: 128
  pyroscope:
    endpoint: "http://pyroscope:4040"
    tenantId: ""
    authToken: ""
    # Reference an existing Secret for Pyroscope auth token (recommended over plaintext)
    # The Secret should have a key named "auth-token"
    existingSecret: ""
  symbolCacheMaxEntries: 50000

# Java profiling via Pyroscope Java agent (sidecar injection for workloads)
# These values are not used by the kpod-metrics DaemonSet itself.
# Copy this section to your application chart's values.yaml.
javaProfiling:
  enabled: false
  image: "grafana/pyroscope-java:0.14.0"
  appName: ""           # e.g., "myapp{namespace=default}"
  pyroscopeEndpoint: "http://pyroscope:4040"
  tenantId: ""
  authToken: ""
  extraJavaOpts: ""
