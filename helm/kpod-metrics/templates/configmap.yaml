apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
data:
  application.yml: |
    kpod:
      profile: {{ .Values.config.profile }}
      poll-interval: {{ .Values.config.pollInterval }}
      startup-jitter: {{ .Values.config.startupJitter | default 5000 }}
      collection-timeout: {{ .Values.config.collectionTimeout | default 20000 }}
      node-name: ${NODE_NAME}
      {{- if .Values.config.clusterName }}
      cluster-name: {{ .Values.config.clusterName }}
      {{- end }}
      {{- if .Values.config.collectors }}
      collectors:
        {{- toYaml .Values.config.collectors | nindent 8 }}
      {{- end }}
      {{- if .Values.config.collectorIntervals }}
      collector-intervals:
        {{- toYaml .Values.config.collectorIntervals | nindent 8 }}
      {{- end }}
      discovery:
        mode: ${KPOD_DISCOVERY_MODE:informer}
        kubelet-poll-interval: {{ .Values.config.discovery.kubeletPollInterval }}
        node-ip: ${NODE_IP:}
      bpf:
        program-dir: /app/bpf
      cgroup:
        root: {{ .Values.config.cgroup.root }}
        proc-root: {{ .Values.config.cgroup.procRoot }}
      filter:
        {{- if .Values.config.filter.namespaces }}
        namespaces:
          {{- toYaml .Values.config.filter.namespaces | nindent 10 }}
        {{- else }}
        namespaces: []
        {{- end }}
        exclude-namespaces:
          {{- toYaml .Values.config.filter.excludeNamespaces | nindent 10 }}
        {{- if .Values.config.filter.labelSelector }}
        label-selector: {{ .Values.config.filter.labelSelector | quote }}
        {{- end }}
        include-labels:
          {{- toYaml .Values.config.filter.includeLabels | nindent 10 }}
      {{- if .Values.profiling.enabled }}
      profiling:
        enabled: true
        cpu:
          enabled: {{ .Values.profiling.cpu.enabled }}
          frequency: {{ .Values.profiling.cpu.frequency }}
          stack-depth: {{ .Values.profiling.cpu.stackDepth }}
        pyroscope:
          endpoint: {{ .Values.profiling.pyroscope.endpoint | quote }}
          {{- if .Values.profiling.pyroscope.tenantId }}
          tenant-id: {{ .Values.profiling.pyroscope.tenantId | quote }}
          {{- end }}
          {{- if .Values.profiling.pyroscope.existingSecret }}
          auth-token: ${KPOD_PROFILING_PYROSCOPE_AUTH_TOKEN:}
          {{- else if .Values.profiling.pyroscope.authToken }}
          auth-token: {{ .Values.profiling.pyroscope.authToken | quote }}
          {{- end }}
        symbol-cache-max-entries: {{ .Values.profiling.symbolCacheMaxEntries }}
      {{- end }}
      {{- if .Values.otlp.enabled }}
      otlp:
        enabled: true
        endpoint: {{ .Values.otlp.endpoint | quote }}
        step: {{ .Values.otlp.step }}
        {{- if .Values.otlp.headers }}
        headers:
          {{- toYaml .Values.otlp.headers | nindent 10 }}
        {{- end }}
      {{- end }}
      tracing:
        enabled: {{ .Values.tracing.enabled }}
        otlp-endpoint: {{ .Values.tracing.otlpEndpoint | quote }}
        ring-buffer-size-kb: {{ .Values.tracing.ringBufferSizeKb }}
        http:
          enabled: {{ .Values.tracing.http.enabled }}
          threshold-ms: {{ .Values.tracing.http.thresholdMs }}
        redis:
          enabled: {{ .Values.tracing.redis.enabled }}
          threshold-ms: {{ .Values.tracing.redis.thresholdMs }}
        mysql:
          enabled: {{ .Values.tracing.mysql.enabled }}
          threshold-ms: {{ .Values.tracing.mysql.thresholdMs }}
      topology:
        enabled: {{ .Values.topology.enabled }}
        window-size: {{ .Values.topology.windowSize }}
        max-external-nodes: {{ .Values.topology.maxExternalNodes }}
        demo-data: {{ .Values.topology.demoData | default false }}
    spring:
      threads:
        virtual:
          enabled: true
    server:
      port: 9090
      shutdown: graceful
    spring.lifecycle:
      timeout-per-shutdown-phase: 30s
    management:
      endpoints:
        web:
          exposure:
            include: health, prometheus, info, kpodDiagnostics, kpodTracing, kpodTopology
      metrics:
        export:
          prometheus:
            enabled: true
