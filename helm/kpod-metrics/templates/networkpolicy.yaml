{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "kpod-metrics.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kpod-metrics.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Prometheus to scrape metrics
    - ports:
        - port: 9090
          protocol: TCP
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow K8s API access (pod discovery)
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    {{- if .Values.otlp.enabled }}
    # Allow OTLP metrics push
    - ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
    {{- end }}
    {{- if .Values.profiling.enabled }}
    # Allow Pyroscope profile push
    - ports:
        - port: 4040
          protocol: TCP
    {{- end }}
{{- end }}
