name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternatives you've tried?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Metrics / Collectors
        - L7 Protocol Detection
        - Service Topology
        - Helm Chart
        - Grafana Dashboard
        - Documentation
        - Performance
        - Other
