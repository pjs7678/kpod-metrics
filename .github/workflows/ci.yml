name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: pjs7678/kotlin-ebpf-dsl
          path: kotlin-ebpf-dsl

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew test detekt -PebpfDslPath=${{ github.workspace }}/kotlin-ebpf-dsl

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Strict lint
        run: helm lint helm/kpod-metrics --strict

      - name: Template — default values
        run: helm template test helm/kpod-metrics > /dev/null

      - name: Template — OTLP enabled
        run: |
          helm template test helm/kpod-metrics \
            --set otlp.enabled=true \
            --set otlp.endpoint=http://collector:4318/v1/metrics > /dev/null

      - name: Template — profiling enabled
        run: |
          helm template test helm/kpod-metrics \
            --set profiling.enabled=true \
            --set profiling.pyroscope.endpoint=http://pyroscope:4040 > /dev/null

      - name: Template — secrets enabled
        run: |
          helm template test helm/kpod-metrics \
            --set otlp.enabled=true \
            --set otlp.existingSecret=otlp-creds \
            --set profiling.enabled=true \
            --set profiling.pyroscope.existingSecret=pyroscope-creds > /dev/null

      - name: Schema validation — reject invalid profile
        run: |
          ! helm template test helm/kpod-metrics \
            --set config.profile=nonexistent 2>/dev/null

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner (repo mode)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
