name: Publish Helm Chart

on:
  push:
    branches: [main]
    paths: ["helm/**"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          mkdir -p .helm-repo
          helm package helm/kpod-metrics -d .helm-repo

      - name: Fetch existing index and merge
        run: |
          if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git checkout origin/gh-pages -- index.yaml 2>/dev/null && \
              mv index.yaml .helm-repo/existing-index.yaml && \
              helm repo index .helm-repo --url https://pjs7678.github.io/kpod-metrics --merge .helm-repo/existing-index.yaml || true
          fi
          if [ ! -f .helm-repo/index.yaml ]; then
            helm repo index .helm-repo --url https://pjs7678.github.io/kpod-metrics
          fi

      - name: Generate landing page
        run: |
          cat > .helm-repo/index.html <<'LANDING'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>kpod-metrics Helm Repository</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 720px; margin: 60px auto; padding: 0 20px; color: #24292f; }
              h1 { border-bottom: 1px solid #d0d7de; padding-bottom: 12px; }
              code { background: #f6f8fa; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
              pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto; }
              a { color: #0969da; }
            </style>
          </head>
          <body>
            <h1>kpod-metrics Helm Repository</h1>
            <p>eBPF-based pod-level kernel metrics collector for Kubernetes.</p>
            <h2>Usage</h2>
            <pre><code>helm repo add kpod-metrics https://pjs7678.github.io/kpod-metrics
          helm repo update
          helm install kpod-metrics kpod-metrics/kpod-metrics \
            --namespace kpod-metrics --create-namespace</code></pre>
            <h2>Links</h2>
            <ul>
              <li><a href="https://github.com/pjs7678/kpod-metrics">GitHub Repository</a></li>
              <li><a href="https://github.com/pjs7678/kpod-metrics/blob/main/README.md">Documentation</a></li>
              <li><a href="index.yaml">Helm Chart Index</a></li>
            </ul>
          </body>
          </html>
          LANDING

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .helm-repo
          publish_branch: gh-pages
