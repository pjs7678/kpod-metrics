name: E2E Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 06:00 UTC
  pull_request:
    branches: [main]
    paths:
      - 'bpf/**'
      - 'Dockerfile'
      - 'helm/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yml'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          path: kpod-metrics

      - uses: actions/checkout@v6
        with:
          repository: pjs7678/kotlin-ebpf-dsl
          path: kotlin-ebpf-dsl

      - name: Enable BPF for containers
        run: |
          sudo sysctl -w kernel.unprivileged_bpf_disabled=0
          sudo sysctl -w net.core.bpf_jit_enable=1

      - uses: medyagh/setup-minikube@latest
        with:
          minikube-version: latest
          kubernetes-version: v1.30.0

      - name: Enable BPF inside minikube
        run: |
          minikube ssh -- sudo sysctl -w kernel.unprivileged_bpf_disabled=0
          minikube ssh -- sudo sysctl -w net.core.bpf_jit_enable=1 || true

      - name: Build image
        run: |
          eval $(minikube docker-env)
          docker build -f kpod-metrics/Dockerfile \
            --build-arg TARGETARCH=amd64 \
            -t kpod-metrics:e2e \
            -t ghcr.io/pjs7678/kpod-metrics:e2e .

      - uses: azure/setup-helm@v5

      - name: Deploy kpod-metrics
        run: |
          helm install kpod-metrics kpod-metrics/helm/kpod-metrics \
            --set image.repository=ghcr.io/pjs7678/kpod-metrics \
            --set image.tag=e2e \
            --set image.pullPolicy=Never \
            --set securityContext.privileged=true \
            --set securityContext.allowPrivilegeEscalation=true \
            --set config.profile=comprehensive \
            --set config.collectionTimeout=30000

      - name: Wait for pod ready
        run: |
          kubectl rollout status daemonset/kpod-metrics --timeout=120s

      - name: Deploy e2e workloads
        run: |
          kubectl create namespace e2e-test --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f kpod-metrics/e2e/workloads.yaml
          echo "Waiting for e2e workload pods..."
          for pod in e2e-cpu-worker e2e-net-server e2e-net-client e2e-dns-worker e2e-syscall-worker e2e-mem-worker; do
            kubectl wait --for=condition=Ready "pod/$pod" -n e2e-test --timeout=60s || echo "Warning: $pod not ready"
          done
          kubectl get pods -n e2e-test

      - name: Verify BPF program loads
        run: |
          POD=$(kubectl get pods -l app.kubernetes.io/name=kpod-metrics -o jsonpath='{.items[0].metadata.name}')
          echo "=== BPF load status ==="
          kubectl logs "$POD" | grep -iE '(bpf|ebpf|loaded|attach|program)' || echo "No BPF log lines found"
          echo ""
          echo "=== Kernel BPF config ==="
          kubectl exec "$POD" -- cat /proc/sys/kernel/unprivileged_bpf_disabled 2>/dev/null || echo "Cannot read sysctl"
          kubectl exec "$POD" -- ls -la /app/bpf/core/ 2>/dev/null || echo "No core BPF objects"
          kubectl exec "$POD" -- ls -la /app/bpf/legacy/ 2>/dev/null || echo "No legacy BPF objects"

      - name: Run E2E checks
        run: |
          POD=$(kubectl get pods -l app.kubernetes.io/name=kpod-metrics -o jsonpath='{.items[0].metadata.name}')
          echo "Pod: $POD"

          # Wait for collection cycles (DNS/tcp_peer collectors need more time)
          sleep 60

          # Check health endpoint (don't fail on HTTP errors — app may report DOWN
          # if BPF collectors fail, but we still want to check metrics)
          kubectl exec "$POD" -- curl -s http://localhost:9090/actuator/health | tee /tmp/health.json
          echo ""

          # Check Prometheus metrics endpoint
          kubectl exec "$POD" -- curl -s http://localhost:9090/actuator/prometheus | tee /tmp/metrics.txt
          echo ""

          if [ ! -s /tmp/metrics.txt ]; then
            echo "FAIL: metrics endpoint returned empty response"
            exit 1
          fi

          FAIL=0
          WARN=0

          # --- Must-pass metrics (cgroup-based + meta, always present) ---
          for metric in \
            kpod_fs_usage_bytes \
            kpod_collection_cycle_duration_seconds_count \
            kpod_collector_duration_seconds_count \
            kpod_bpf_programs_loaded; do
            if grep -q "$metric" /tmp/metrics.txt; then
              echo "PASS: $metric"
            else
              echo "FAIL: $metric not found"
              FAIL=1
            fi
          done

          # --- BPF-dependent metrics (warn-only — BPF may not load in minikube) ---
          for metric in \
            kpod_cpu_context_switches_total \
            kpod_cpu_runqueue_latency_bucket \
            kpod_net_tcp_connections_total \
            kpod_net_tcp_retransmits_total \
            kpod_disk_read_bytes_total \
            kpod_dns_requests_total \
            kpod_dns_latency_count \
            kpod_net_tcp_peer_connections_total; do
            if grep -q "$metric" /tmp/metrics.txt; then
              echo "PASS: $metric"
            else
              echo "WARN: $metric not found (BPF may not be supported in this environment)"
              WARN=$((WARN + 1))
            fi
          done

          # Verify health status (warn-only — may be DOWN if BPF collectors fail)
          if [ -s /tmp/health.json ]; then
            if python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if d['status']=='UP' else 1)" < /tmp/health.json; then
              echo "PASS: health status UP"
            else
              echo "WARN: health status not UP (expected if BPF programs failed to load)"
              WARN=$((WARN + 1))
            fi
          else
            echo "WARN: health endpoint returned empty response"
            WARN=$((WARN + 1))
          fi

          echo ""
          echo "=== Summary ==="
          echo "Failures: $FAIL  Warnings: $WARN"

          if [ "$FAIL" -gt 0 ]; then
            echo "E2E checks failed"
            exit 1
          fi
          echo "All E2E checks passed ($WARN warning(s))"

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Pod logs ==="
          kubectl logs -l app.kubernetes.io/name=kpod-metrics --tail=200 || true
          echo "=== DaemonSet describe ==="
          kubectl describe daemonset kpod-metrics || true
          echo "=== Events ==="
          kubectl get events --sort-by='.lastTimestamp' || true
          echo "=== E2E workload pods ==="
          kubectl get pods -n e2e-test -o wide || true
